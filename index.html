      /* ── Skeleton shimmer (GPU-accelerated via translateX) ── */
      @keyframes skeleton-shimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }

      @keyframes skeleton-logo-pulse {
        0% {
          opacity: 0.08;
        }
        50% {
          opacity: 0.15;
        }
        100% {
          opacity: 0.08;
        }
      }

      @keyframes skeleton-safety-fade {
        0%,
        99% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          pointer-events: none;
        }
      }

      /* ── Progressive reveal entrance ── */
      @keyframes skeleton-reveal {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      /* ── Base skeleton container ── */
      #startup-skeleton {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        background: var(--theme-surface-canvas, #19191a);
        animation: skeleton-safety-fade 10s forwards;
        transition: opacity 250ms ease-out;
      }
      #startup-skeleton.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      /* ── Progressive reveal delays ── */
      .skel-reveal {
        opacity: 0;
        animation: skeleton-reveal 400ms ease-out forwards;
      }
      .skel-reveal-d1 {
        animation-delay: 0ms;
      }
      .skel-reveal-d2 {
        animation-delay: 80ms;
      }
      .skel-reveal-d3 {
        animation-delay: 160ms;
      }
      .skel-reveal-d4 {
        animation-delay: 240ms;
      }
      .skel-reveal-d5 {
        animation-delay: 320ms;
      }

      /* ── Toolbar ── */
      .skeleton-toolbar {
        height: 48px;
        flex-shrink: 0;
        background: var(--theme-surface-sidebar, #131312);
        border-bottom: 1px solid var(--theme-border-default, #282828);
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
        align-items: center;
        padding: 4px 16px 0;
        -webkit-app-region: drag;

      .skeleton-toolbar-left {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .skeleton-toolbar-center {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .skeleton-toolbar-right {
        display: flex;
        align-items: center;
        justify-content: flex-end;

          var(--theme-surface-sidebar, #131312),
          var(--theme-text-primary, #e0e0e0) 8%

        content: "";
        position: absolute;
        inset: 0;
        transform: translateX(-100%);
        will-change: transform;
        background: linear-gradient(
          90deg,
          transparent 0%,
          color-mix(
              in oklch,
              var(--theme-surface-sidebar, #131312),
              var(--theme-text-primary, #e0e0e0) 13%
            )
            50%,
          transparent 100%

        animation: skeleton-shimmer 1.5s linear infinite;
      }
      .skel-circle {
        border-radius: 50%;
      }
      .skel-pill {
        border-radius: 9999px;
      }

        background: color-mix(
          in oklch,
          var(--theme-surface-sidebar, #131312),
          var(--theme-text-primary, #e0e0e0) 6%

          var(--theme-text-primary, #e0e0e0) 10%

        display: flex;
        flex-direction: column;

      /* ── Main content area ── */
      .skeleton-main {
        flex: 1;
        background: var(--theme-surface-canvas, #19191a);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;

      }
      .skeleton-main-inner {
        max-width: 768px;
        width: 100%;
        display: flex;
        flex-direction: column;

      /* ── Logo section ── */

      .skeleton-recipes {

      /* ── Pulse card skeleton ── */
      .skeleton-pulse {

      .skeleton-pulse-header {

        display: flex;
        align-items: center;
        gap: 8px;
      }
      .skeleton-pulse-body {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      /* Heatmap skeleton */
      .skeleton-heatmap {
        display: flex;
        gap: 3px;
      }
      .skel-heat-cell {
        width: 10px;
        height: 10px;
        flex-shrink: 0;
        border-radius: 2px;
        background: color-mix(

          var(--theme-surface-canvas, #19191a),
          var(--theme-text-primary, #e0e0e0) 6%

      .skeleton-pulse-stats {

        align-items: center;

            <div class="skeleton-recipes skel-reveal skel-reveal-d4">
              <div class="skel-recipe">
                <div class="skel-recipe-row">
                  <div class="skel-recipe-icon"></div>
                  <div class="skel-recipe-name" style="width: 50%"></div>
                </div>
              </div>
              <div class="skel-recipe">
                <div class="skel-recipe-row">
                  <div class="skel-recipe-icon"></div>
                  <div class="skel-recipe-name" style="width: 70%"></div>
                </div>
              </div>

              <div class="skel-recipe-create">
                <div
                  class="skel-shape"
                  style="width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0"
                ></div>
                <div
                  class="skel-shape"
                  style="width: 110px; height: 12px; border-radius: 3px"
                ></div>
              </div>
            </div>

            <!-- Project Pulse (reveals fifth) -->
            <div class="skeleton-pulse skel-reveal skel-reveal-d5">
              <div class="skeleton-pulse-header">
                <div class="skeleton-pulse-header-left">

                  <div class="skel-shape skel-pill" style="width: 36px; height: 22px"></div>
                </div>

                <div class="skeleton-heatmap" id="skel-heatmap"></div>
                <!-- Summary text -->
                <div
                  class="skel-shape"
                  style="width: 160px; height: 12px; border-radius: 3px"
                ></div>
                <!-- Health signal chips -->
                <div
                  class="skeleton-pulse-stats"
                  style="
                    border-top: 1px solid var(--theme-border-default, #282828);
                    padding-top: 12px;
                  "
                >
                  <div class="skel-shape skel-pill" style="width: 72px; height: 22px"></div>
                  <div class="skel-shape skel-pill" style="width: 48px; height: 22px"></div>
                  <div class="skel-shape skel-pill" style="width: 48px; height: 22px"></div>
                  <div class="skel-shape skel-pill" style="width: 88px; height: 22px"></div>
                  <div class="skel-shape skel-pill" style="width: 96px; height: 22px"></div>
                </div>
                <!-- Stats row -->
                <div
                  class="skeleton-pulse-stats"
                  style="
                    border-top: 1px solid var(--theme-border-default, #282828);
                    padding-top: 12px;
                  "
                >

                    class="skel-shape"
                    style="width: 60px; height: 12px; border-radius: 3px"
                  ></div>
                  <div
                    class="skel-shape"
                    style="width: 52px; height: 12px; border-radius: 3px"
                  ></div>
                  <div
                    class="skel-shape"
                    style="width: 64px; height: 12px; border-radius: 3px"
                  ></div>
                </div>
              </div>
            </div>

            <!-- Tip section (reveals with pulse) -->
            <div class="skeleton-tip skel-reveal skel-reveal-d5">
              <div class="skel-shape" style="width: 200px; height: 12px; border-radius: 3px"></div>
              <div class="skel-shape" style="width: 110px; height: 12px; border-radius: 3px"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="/skeleton-heatmap.js"></script>
    <script>
      // Safety: clean up aria state if skeleton fades via CSS timeout
      setTimeout(function () {
        var s = document.getElementById("startup-skeleton");
        if (s && !s.classList.contains("fade-out")) {
          s.setAttribute("aria-busy", "false");
        }
      }, 10000);
    </script>
