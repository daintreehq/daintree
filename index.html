    <style>
      /* ── Skeleton shimmer (GPU-accelerated via translateX) ── */
      @keyframes skeleton-shimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }

      @keyframes skeleton-logo-pulse {
        0% {
          opacity: 0.08;
        }
        50% {
          opacity: 0.15;
        }
        100% {
          opacity: 0.08;
        }
      }

      /*
       * Doherty 400ms anti-flicker gate. `animation-fill-mode: backwards`
       * holds the `from` keyframe (opacity: 0) during the 400ms delay so
       * sub-threshold loads never flash a skeleton, then fades to opacity 1
       * over 200ms. Base CSS `opacity: 1` is the post-animation resting
       * state, which lets the JS-driven `.fade-out` transition take over
       * cleanly when removeStartupSkeleton() runs. The previous 10s silent
       * safety-fade is replaced by the visible stuck-state overlay at 6s.
       */
      @keyframes skeleton-doherty-gate {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      /* ── Progressive reveal entrance ── */
      @keyframes skeleton-reveal {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      /* Stuck-state reveal — animates pointer-events as a discrete property
         so the overlay can't intercept clicks during the 6s delay window. */
      @keyframes skeleton-stuck-reveal {
        from {
          opacity: 0;
          pointer-events: none;
        }
        to {
          opacity: 1;
          pointer-events: auto;
        }
      }

      /* ── Base skeleton container ── */
      #startup-skeleton {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        background: var(--theme-surface-grid, #0e0e0d);
        animation: skeleton-doherty-gate 200ms ease-out 400ms backwards;
        transition: opacity 120ms ease-out;
      }
      #startup-skeleton.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      /* ── Progressive reveal delays ── */
      .skel-reveal {
        opacity: 0;
        animation: skeleton-reveal 400ms ease-out forwards;
      }
      .skel-reveal-d1 {
        animation-delay: 0ms;
      }
      .skel-reveal-d2 {
        animation-delay: 80ms;
      }
      .skel-reveal-d3 {
        animation-delay: 160ms;
      }
      .skel-reveal-d4 {
        animation-delay: 240ms;
      }
      .skel-reveal-d5 {
        animation-delay: 320ms;
      }

      /* ── Toolbar ── */
      .skeleton-toolbar {
        height: 48px;
        flex-shrink: 0;
        background: var(--theme-surface-toolbar, #131312);
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
        align-items: center;
        padding: 4px 16px 0;
        -webkit-app-region: drag;
      }
      .skeleton-toolbar-left {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .skeleton-toolbar-center {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .skeleton-toolbar-right {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 6px;
      }

      /* ── Skeleton placeholder shapes (3-tier opacity hierarchy) ── */
      .skel-shape {
        position: relative;
        overflow: hidden;
        border-radius: 4px;
        background: color-mix(
          in oklch,
          var(--theme-surface-sidebar, #131312),
          var(--theme-text-primary, #e4e4e7) 8%
        );
      }
      .skel-shape::after {
        content: "";
        position: absolute;
        inset: 0;
        transform: translateX(-100%);
        will-change: transform;
        background: linear-gradient(
          90deg,
          transparent 0%,
          color-mix(
              in oklch,
              var(--theme-surface-sidebar, #131312),
              var(--theme-text-primary, #e4e4e7) 13%
            )
            50%,
          transparent 100%
        );
        animation: skeleton-shimmer 1.5s linear infinite;
      }
      .skel-circle {
        border-radius: 50%;
      }
      .skel-pill {
        border-radius: 9999px;
      }

      /* ── Toolbar shapes: subtler than content shapes ── */
      .skeleton-toolbar .skel-shape {
        background: color-mix(
          in oklch,
          var(--theme-surface-sidebar, #131312),
          var(--theme-text-primary, #e4e4e7) 6%

      /* ── Stuck-state overlay (fades in at 6s if React never hydrates) ── */

        animation-delay: 6000ms;
      }
      .skeleton-stuck-title {

        font-size: 15px;
        font-weight: 600;
        line-height: 1.5;
        color: var(--theme-text-primary, #e4e4e7);

      .skeleton-stuck-btn {
