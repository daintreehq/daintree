name: E2E Core Tests

on:
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to test on"
        type: choice
        default: "all"
        options:
          - all
          - macos
          - linux
          - windows
  workflow_call:
    inputs:
      platform:
        description: "Platform to test on"
        type: string
        default: "all"

permissions:
  contents: read

concurrency:
  group: e2e-core-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # Determine which platforms to run on
  matrix-setup:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          PLATFORM="${{ inputs.platform || 'all' }}"

          # PRs always run Linux-only regardless of input
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo 'matrix={"include":[{"os":"ubuntu-22.04","name":"Linux"}]}' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" = "macos" ]; then
            echo 'matrix={"include":[{"os":"macos-14","name":"macOS"}]}' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" = "linux" ]; then
            echo 'matrix={"include":[{"os":"ubuntu-22.04","name":"Linux"}]}' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" = "windows" ]; then
            echo 'matrix={"include":[{"os":"windows-latest","name":"Windows"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"os":"macos-14","name":"macOS"},{"os":"ubuntu-22.04","name":"Linux"},{"os":"windows-latest","name":"Windows"}]}' >> "$GITHUB_OUTPUT"
          fi

  e2e-core:
    needs: matrix-setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-setup.outputs.matrix) }}

    runs-on: ${{ matrix.os }}
    name: Core (${{ matrix.name }})
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgbm1 \
            libgtk-3-0 \
            libnss3 \
            libasound2 \
            libxss1 \
            libxtst6 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libnotify4 \
            xvfb

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Run core e2e tests (macOS)
        if: runner.os == 'macOS'
        run: npm run test:e2e:core

      - name: Run core e2e tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run test:e2e:core

      - name: Run core e2e tests (Windows)
        if: runner.os == 'Windows'
        run: npm run test:e2e:core

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-core-results-${{ matrix.name }}-${{ github.sha }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore
