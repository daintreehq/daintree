name: E2E Online Tests

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to test on"
        type: choice
        default: "all"
        options:
          - all
          - macos
          - linux
          - windows
  workflow_call:
    inputs:
      platform:
        description: "Platform to test on"
        type: string
        default: "all"

permissions:
  contents: read
  issues: write

concurrency:
  group: e2e-online-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  matrix-setup:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          PLATFORM="${{ inputs.platform || 'all' }}"
          if [ "$PLATFORM" = "macos" ]; then
            echo 'matrix={"include":[{"os":"macos-14","name":"macOS"}]}' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" = "linux" ]; then
            echo 'matrix={"include":[{"os":"ubuntu-22.04","name":"Linux"}]}' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" = "windows" ]; then
            echo 'matrix={"include":[{"os":"windows-latest","name":"Windows"}]}' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" = "non-windows" ]; then
            echo 'matrix={"include":[{"os":"macos-14","name":"macOS"},{"os":"ubuntu-22.04","name":"Linux"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"os":"macos-14","name":"macOS"},{"os":"ubuntu-22.04","name":"Linux"},{"os":"windows-latest","name":"Windows"}]}' >> "$GITHUB_OUTPUT"
          fi

  e2e-online:
    needs: matrix-setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-setup.outputs.matrix) }}

    runs-on: ${{ matrix.os }}
    name: Online (${{ matrix.name }})
    timeout-minutes: 30

    steps:
      - name: Harden Windows for Electron E2E
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Disable real-time monitoring entirely (exclusions alone are insufficient)
          Set-MpPreference -DisableRealtimeMonitoring $true

          # Disable Windows Search indexer to prevent file handle contention
          Stop-Service -Name "WSearch" -Force -ErrorAction SilentlyContinue
          Set-Service -Name "WSearch" -StartupType Disabled -ErrorAction SilentlyContinue

          # Disable Superfetch/SysMain which can lock files during prefetch
          Stop-Service -Name "SysMain" -Force -ErrorAction SilentlyContinue
          Set-Service -Name "SysMain" -StartupType Disabled -ErrorAction SilentlyContinue

          # Disable diagnostics tracking that scans new executables
          Stop-Service -Name "DiagTrack" -Force -ErrorAction SilentlyContinue
          Set-Service -Name "DiagTrack" -StartupType Disabled -ErrorAction SilentlyContinue

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgbm1 \
            libgtk-3-0 \
            libnss3 \
            libasound2 \
            libxss1 \
            libxtst6 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libnotify4 \
            xvfb

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Configure Claude Code (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          mkdir -p ~/.claude
          echo '{"hasCompletedOnboarding": true}' > ~/.claude.json
          echo '{"model": "claude-haiku-4-5-20251001"}' > ~/.claude/settings.json

      - name: Configure Claude Code (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.claude" | Out-Null
          '{"hasCompletedOnboarding": true}' | Set-Content "$env:USERPROFILE\.claude.json"
          '{"model": "claude-haiku-4-5-20251001"}' | Set-Content "$env:USERPROFILE\.claude\settings.json"

      - name: Run online e2e tests (macOS)
        if: runner.os == 'macOS'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run test:e2e:online

      - name: Run online e2e tests (Linux)
        if: runner.os == 'Linux'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: xvfb-run --auto-servernum npm run test:e2e:online

      - name: Verify native modules (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          node -e "try { require('node-pty'); console.log('node-pty: OK') } catch(e) { console.error('node-pty FAILED:', e.message); process.exit(1) }"

      - name: Run online e2e tests (Windows)
        if: runner.os == 'Windows'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELECTRON_ENABLE_LOGGING: "1"
        run: npm run test:e2e:online

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-online-results-${{ matrix.name }}-${{ github.sha }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  notify:
    if: failure() && github.event_name == 'schedule'
    needs: e2e-online
    runs-on: ubuntu-22.04
    permissions:
      issues: write

    steps:
      - name: Create or update failure issue
        uses: actions/github-script@v8
        with:
          script: |
            const title = `[Nightly E2E] Online tests failed on ${new Date().toISOString().split('T')[0]}`;
            const label = 'e2e-nightly-failure';
            const body = `The nightly E2E online tests failed.\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n**Date:** ${new Date().toISOString()}`;

            // Check for existing open issue with the label
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
              per_page: 1,
            });

            if (issues.length > 0) {
              // Add comment to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: body,
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label],
              });
            }
