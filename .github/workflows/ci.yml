name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Check (typecheck + lint + format)
        run: npm run check

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

  compiler-budget:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (with React Compiler logger)
        run: npm run compiler-budget:build

      - name: Check compiler bailout budget
        run: npm run compiler-budget:check

  eager-import-budget:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Build eager-import metafile
        run: npm run import-budget:build

      - name: Check eager-import budget
        run: npm run import-budget:check

  renderer-bundle-budget:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (with bundle size report)
        run: npm run renderer-bundle-budget:build

      - name: Check renderer bundle size budget
        id: budget-check
        run: |
          OVERRIDE=false
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels -q '.labels[].name' 2>/dev/null || echo "")
            if echo "$LABELS" | grep -qx "bundle-size-override"; then
              OVERRIDE=true
            fi
            HEAD_SHA=$(git rev-parse HEAD)
            if git log --format=%B -1 "$HEAD_SHA" | grep -q '\[bundle-size-override\]'; then
              OVERRIDE=true
            fi
          fi
          if [ "$OVERRIDE" = "true" ]; then
            npm run renderer-bundle-budget:check -- --override
          else
            npm run renderer-bundle-budget:check
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Comment PR with bundle size summary
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if [ -f dist/renderer-bundle-size-summary.md ]; then
            { echo '<!-- renderer-bundle-budget -->'; cat dist/renderer-bundle-size-summary.md; } | \
              gh pr comment ${{ github.event.pull_request.number }} --body-file -
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  build:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke test
        run: xvfb-run --auto-servernum npm run test:smoke
        env:
          NODE_ENV: production
          ELECTRON_ENABLE_LOGGING: "1"
          SMOKE_RUNS: "1"
          SMOKE_TIMEOUT_MS: "210000"
        timeout-minutes: 6

  # Gate job — use this as the sole required status check in branch protection.
  # Insulates against matrix/job name changes breaking required checks.
  ci-ok:
    if: always()
    needs: [check, test, compiler-budget, eager-import-budget, renderer-bundle-budget]
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check results
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
