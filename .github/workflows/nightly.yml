name: Nightly

on:
  schedule:
    # https://crontab.guru/#0_2_*_*_*
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to test"
        type: choice
        options:
          - all
          - macos
          - linux
          - windows
        default: all

permissions:
  contents: read
  issues: write

env:
  NODE_VERSION: "22"
  # Nightly is Daintree-only. Legacy Canopy ships via tagged releases in
  # release.yml, not nightly. Nightly publish URL + filename are resolved by
  # electron-builder.config.cjs from the stamped `-nightly.*` version — no
  # CLI overrides here.
  BUILD_VARIANT: "daintree"

jobs:
  matrix-setup:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          PLATFORM="${{ inputs.platform || 'all' }}"

          if [ "$PLATFORM" = "macos" ]; then
            echo 'matrix={"include":[{"os":"macos-14","name":"macOS"}]}' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" = "linux" ]; then
            echo 'matrix={"include":[{"os":"ubuntu-22.04","name":"Linux"}]}' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" = "windows" ]; then
            echo 'matrix={"include":[{"os":"windows-latest","name":"Windows"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"os":"ubuntu-22.04","name":"Linux"},{"os":"macos-14","name":"macOS"},{"os":"windows-latest","name":"Windows"}]}' >> "$GITHUB_OUTPUT"
          fi

  check:
    needs: matrix-setup
    runs-on: ${{ matrix.os }}
    name: Check (${{ matrix.name }})
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-setup.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: npm ci
        env:
          npm_config_msvs_version: "2022"

      - name: Install dependencies
        if: matrix.os != 'windows-latest'
        run: npm ci

      - name: Check (typecheck + lint + format)
        run: npm run check

  test:
    needs: matrix-setup
    runs-on: ${{ matrix.os }}
    name: Test (${{ matrix.name }})
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-setup.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: npm ci
        env:
          npm_config_msvs_version: "2022"

      - name: Install dependencies
        if: matrix.os != 'windows-latest'
        run: npm ci

      - name: Test
        run: npm run test

  build:
    needs: [matrix-setup, check, test]
    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-setup.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libarchive-tools \
            libxss-dev \
            libsecret-1-dev \
            libnss3-dev \
            libnotify-dev \
            libxkbfile-dev

      - name: Fontconfig cache key
        id: fontconfig-cache-key
        if: matrix.os == 'ubuntu-22.04'
        run: |
          set -euo pipefail
          mkdir -p ~/.cache/fontconfig
          source /etc/os-release
          echo "ubuntu=${ID}-${VERSION_ID}-${VERSION_CODENAME}" >> "$GITHUB_OUTPUT"
          echo "fc_version=$(fc-cache --version 2>&1 | head -1)" >> "$GITHUB_OUTPUT"
          echo "font_pkg_hash=$(dpkg-query -W -f='${Package} ${Version}\n' 2>/dev/null | grep -E '^fonts-|^fontconfig' | LC_ALL=C sort | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache fontconfig
        id: cache-fontconfig
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/cache@v4
        with:
          path: ~/.cache/fontconfig
          key: fontconfig-${{ runner.os }}-${{ runner.arch }}-${{ steps.fontconfig-cache-key.outputs.ubuntu }}-${{ steps.fontconfig-cache-key.outputs.fc_version }}-${{ steps.fontconfig-cache-key.outputs.font_pkg_hash }}

      - name: Warm fontconfig cache
        if: matrix.os == 'ubuntu-22.04'
        run: fc-cache -fv

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: npm ci
        env:
          npm_config_msvs_version: "2022"

      - name: Install dependencies
        if: matrix.os != 'windows-latest'
        run: npm ci

      - name: Stamp nightly version
        shell: bash
        # Version must be unique per run. Date-only stamps collide on same-day
        # reruns and — combined with the `immutable` cache-control on binaries —
        # cause sha512 mismatches for clients who downloaded the earlier run.
        # UTC second-granular timestamp + short SHA gives us uniqueness and
        # traceability back to the commit.
        run: |
          STAMP=$(date -u +%Y%m%d%H%M%S)
          SHA=$(git rev-parse --short=7 HEAD)
          BASE=$(node -p "require('./package.json').version.replace(/-.*/, '')")
          NIGHTLY_VERSION="${BASE}-nightly.${STAMP}.${SHA}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${NIGHTLY_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Stamped version: ${NIGHTLY_VERSION}"

      - name: Build
        run: npm run build

      - name: Smoke test (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: xvfb-run --auto-servernum npm run test:smoke
        env:
          NODE_ENV: production
          ELECTRON_ENABLE_LOGGING: "1"
          SMOKE_RUNS: "1"
          SMOKE_TIMEOUT_MS: "210000"
        timeout-minutes: 6

      - name: Smoke test (macOS)
        if: matrix.os == 'macos-14'
        run: npm run test:smoke
        env:
          NODE_ENV: production
          ELECTRON_ENABLE_LOGGING: "1"
          SMOKE_RUNS: "1"
          SMOKE_TIMEOUT_MS: "210000"
        timeout-minutes: 6

      - name: Smoke test (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run test:smoke
        env:
          NODE_ENV: production
          ELECTRON_ENABLE_LOGGING: "1"
          ELECTRON_ENABLE_STACK_DUMPING: "1"
          SMOKE_RUNS: "3"
          SMOKE_TIMEOUT_MS: "210000"
        timeout-minutes: 12

      - name: Import macOS certificates
        if: startsWith(matrix.os, 'macos')
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.MAC_CERTS }}
          p12-password: ${{ secrets.MAC_CERTS_PASSWORD }}
          keychain-password: ${{ secrets.MAC_CERTS_PASSWORD }}

      - name: Prepare Apple API key
        if: startsWith(matrix.os, 'macos')
        run: |
          mkdir -p "$RUNNER_TEMP/apple"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/apple/AuthKey.p8"
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}

      # Publish URL is set by electron-builder.config.cjs based on the stamped
      # -nightly.* version (routes to nightlyPublishUrl). We intentionally do
      # NOT pass -c.publish.url / -c.publish.channel CLI overrides: those
      # replace the array-shaped publish config with a plain object and strip
      # `provider: generic`, which fails schema validation. Everything the
      # nightly needs is expressed in the version string + config.
      - name: Package (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/apple/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEBUG: electron-builder,electron-notarize*,electron-osx-sign*
          npm_config_build_from_source: "true"
        run: |
          npx electron-builder --publish never \
            -c.buildDependenciesFromSource=true

      - name: Package (Linux/Windows)
        if: ${{ !startsWith(matrix.os, 'macos') }}
        shell: bash
        env:
          DEBUG: electron-builder,electron-notarize*,electron-osx-sign*
        run: |
          npx electron-builder --publish never

      # Nightly and stable both publish `latest*.yml` — URL separation (not
      # channel-name separation) distinguishes them. The nightly URL prefix is
      # set by the config when it sees a -nightly.* version.
      - name: Validate update metadata (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          if [ ! -f "release/latest.yml" ]; then
            echo "::error::Missing release/latest.yml - Windows auto-update will not work"
            exit 1
          fi
          node scripts/ci/validate-update-metadata.mjs release/latest.yml

      - name: Validate update metadata (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          if [ ! -f "release/latest-mac.yml" ]; then
            echo "::error::Missing release/latest-mac.yml - macOS auto-update will not work"
            exit 1
          fi
          DMG_COUNT=$(find release -maxdepth 1 -name '*.dmg' | wc -l | tr -d ' ')
          ZIP_COUNT=$(find release -maxdepth 1 -name '*.zip' | wc -l | tr -d ' ')
          if [ "$DMG_COUNT" -ne 3 ] || [ "$ZIP_COUNT" -ne 3 ]; then
            echo "::error::Expected 3 DMGs and 3 ZIPs, got $DMG_COUNT DMGs and $ZIP_COUNT ZIPs"
            find release -maxdepth 1 \( -name '*.dmg' -o -name '*.zip' \) -exec ls -la {} +
            exit 1
          fi
          echo "Found $DMG_COUNT DMGs, $ZIP_COUNT ZIPs, and latest-mac.yml"
          node scripts/ci/validate-update-metadata.mjs release/latest-mac.yml

      - name: Validate update metadata (Linux)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          if [ ! -f "release/latest-linux.yml" ]; then
            echo "::error::Missing release/latest-linux.yml - Linux auto-update will not work"
            exit 1
          fi
          node scripts/ci/validate-update-metadata.mjs release/latest-linux.yml

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nightly-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest*.yml
          retention-days: 3
          if-no-files-found: error

  compiler-budget:
    needs: matrix-setup
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (with React Compiler logger)
        run: npm run compiler-budget:build

      - name: Check compiler bailout budget
        run: npm run compiler-budget:check

  eager-import-budget:
    needs: matrix-setup
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Build eager-import metafile
        run: npm run import-budget:build

      - name: Check eager-import budget
        run: npm run import-budget:check

  renderer-bundle-budget:
    needs: matrix-setup
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (with bundle size report)
        run: npm run renderer-bundle-budget:build

      - name: Check renderer bundle size budget
        run: npm run renderer-bundle-budget:check

  integration-test:
    needs: [check, test]
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

  # E2E suites run in parallel with build (both gate on check + test)
  # Nightly runs the full suite (all 72 test files), not just the core subset
  e2e-full:
    needs: [check, test]
    uses: ./.github/workflows/e2e-core.yml
    with:
      project: full

  e2e-online:
    needs: [check, test]
    uses: ./.github/workflows/e2e-online.yml
    secrets: inherit

  e2e-nightly:
    needs: [check, test]
    uses: ./.github/workflows/e2e-nightly.yml

  publish:
    if: inputs.platform == '' || inputs.platform == 'all'
    needs: [build, e2e-full, e2e-online, e2e-nightly]
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: nightly-macos-14
          path: release/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: nightly-ubuntu-22.04
          path: release/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: nightly-windows-latest
          path: release/

      - name: List nightly files
        run: ls -lah release/

      - name: Upload binaries to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.DAINTREE_R2_BUCKET }}
        run: |
          aws s3 sync release/ "s3://${R2_BUCKET}/nightly/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --no-progress \
            --exclude "*" \
            --include "*.dmg" \
            --include "*.zip" \
            --include "*.exe" \
            --include "*.AppImage" \
            --include "*.deb" \
            --include "*.blockmap" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload metadata to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.DAINTREE_R2_BUCKET }}
        run: |
          aws s3 sync release/ "s3://${R2_BUCKET}/nightly/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --no-progress \
            --exclude "*" \
            --include "latest*.yml" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Clean up old nightly builds
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.DAINTREE_R2_BUCKET }}
        run: |
          CUTOFF=$(date -u -d "3 days ago" +%Y-%m-%dT%H:%M:%S)
          echo "Deleting nightly objects older than ${CUTOFF}"

          OBJECTS=$(aws s3api list-objects-v2 \
            --endpoint-url "${R2_ENDPOINT}" \
            --bucket "${R2_BUCKET}" \
            --prefix "nightly/" \
            --query "Contents[?LastModified<='${CUTOFF}'].Key" \
            --output json 2>/dev/null || echo "[]")

          if [ "$OBJECTS" = "null" ] || [ "$OBJECTS" = "[]" ]; then
            echo "No old nightly objects to clean up"
            exit 0
          fi

          # Build the delete payload in batches of 1000
          echo "$OBJECTS" | node -e "
            const keys = JSON.parse(require('fs').readFileSync('/dev/stdin', 'utf8'));
            const filtered = keys.filter(k => k.startsWith('nightly/'));
            if (filtered.length === 0) { console.log('No objects to delete'); process.exit(0); }
            console.log('Deleting ' + filtered.length + ' old nightly objects');
            const batch = filtered.slice(0, 1000).map(k => ({ Key: k }));
            const payload = JSON.stringify({ Objects: batch, Quiet: true });
            require('fs').writeFileSync('/tmp/delete-payload.json', payload);
          "

          if [ -f /tmp/delete-payload.json ]; then
            aws s3api delete-objects \
              --endpoint-url "${R2_ENDPOINT}" \
              --bucket "${R2_BUCKET}" \
              --delete "file:///tmp/delete-payload.json"
            echo "Cleanup complete"
          fi

  notify:
    if: failure() && github.event_name == 'schedule'
    needs:
      [
        check,
        test,
        build,
        compiler-budget,
        eager-import-budget,
        renderer-bundle-budget,
        integration-test,
        e2e-full,
        e2e-online,
        e2e-nightly,
        publish,
      ]
    runs-on: ubuntu-22.04
    permissions:
      issues: write

    steps:
      - name: Create or update failure issue
        uses: actions/github-script@v8
        with:
          script: |
            const title = `[Nightly] Tests failed on ${new Date().toISOString().split('T')[0]}`;
            const label = 'nightly-failure';
            const body = [
              `The nightly test suite failed.`,
              ``,
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Date:** ${new Date().toISOString()}`,
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
              per_page: 1,
            });

            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label],
              });
            }
