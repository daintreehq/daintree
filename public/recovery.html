<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canopy — Recovery</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #0f1219;
        color: #e4e4e7;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        -webkit-app-region: drag;
      }
      .container {
        max-width: 480px;
        text-align: center;
        -webkit-app-region: no-drag;
      }
      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 24px;
        border-radius: 16px;
        background: #1c1f2b;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon svg {
        width: 32px;
        height: 32px;
        stroke: #f59e0b;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      h1 {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 12px;
      }
      .description {
        color: #a1a1aa;
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 8px;
      }
      .details {
        color: #71717a;
        font-size: 12px;
        font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
        background: #1c1f2b;
        border-radius: 8px;
        padding: 12px 16px;
        margin-bottom: 28px;
        word-break: break-all;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      button {
        padding: 10px 20px;
        border-radius: 8px;
        border: none;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition:
          background 0.15s,
          opacity 0.15s;
      }
      button:hover {
        opacity: 0.9;
      }
      button:active {
        opacity: 0.8;
      }
      .btn-primary {
        background: #3b82f6;
        color: #fff;
      }
      .btn-secondary {
        background: #27272a;
        color: #e4e4e7;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <svg viewBox="0 0 24 24">
          <path
            d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"
          />
          <line x1="12" y1="9" x2="12" y2="13" />
          <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
      </div>
      <h1>Something went wrong</h1>
      <p class="description">
        The renderer process crashed repeatedly. You can try reloading the window or reset the
        workspace state if the problem persists.
      </p>
      <div class="details" id="crash-details">Loading crash details…</div>
      <div class="actions">
        <button class="btn-primary" id="btn-reload">Reload Window</button>
        <button class="btn-secondary" id="btn-reset">Reset Workspace State</button>
      </div>
    </div>
    <script src="recovery-renderer.js"></script>
  </body>
</html>
